  <script>
    // Responsive menu toggle
    document.addEventListener('DOMContentLoaded', function () {
      const menuToggle = document.getElementById('menu-toggle');
      const navLinks = document.getElementById('nav-links');
      if (menuToggle && navLinks) {
        menuToggle.addEventListener('click', function () {
          navLinks.classList.toggle('hidden');
        });
      }
    });
  </script>

  <header class="py-16 text-center">
    <h1 class="text-5xl md:text-6xl font-serif text-primary dark:text-secondary mb-4">Our Gallery</h1>
    <p class="text-lg text-gray-500 dark:text-gray-300 max-w-xl mx-auto">A showcase of Vanille's finest cakes, cookies,
      doughnuts, and more.</p>
  </header>
  <main class="max-w-7xl mx-auto px-4 pb-24">
    <!-- Gallery Images Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-10" id="gallery-grid">
      <!-- Gallery cards injected by JS -->
    </div>
    <script>
      // Admin login logic
      let isAdminGallery = false;
      let galleryData = [];

      function renderGallery() {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = '';
        galleryData.forEach((item, idx) => {
          const card = document.createElement('div');
          card.className = 'gallery-card bg-white dark:bg-gray-900 rounded-xl shadow-xl overflow-hidden flex flex-col relative';
          card.innerHTML = `
            <img src="${item.imageUrl}" alt="${item.name}" class="h-56 w-full object-cover">
            <div class="p-4 flex-1 flex flex-col">
              <h3 class="text-xl font-display text-primary dark:text-secondary mb-2">${item.name}</h3>
            </div>
          `;
          grid.appendChild(card);
        });
      }

      function loadGallery() {
        fetch(`${CONFIG.API_BASE_URL}/api/gallery`)
          .then(res => res.json())
          .then(data => {
            galleryData = data;
            renderGallery();
          })
          .catch(err => console.error("Could not load gallery mapping", err));
      }

      function saveGallery() {
        fetch(`${CONFIG.API_BASE_URL}/api/gallery`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(galleryData)
        }).then(() => renderGallery())
          .catch(err => console.error("Failed to save gallery", err));
      }

      document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
  </main>

  <script>
    // Theme persistence logic
    function setTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      }
    }
    // On page load, set theme from localStorage
    (function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
      } else if (savedTheme === 'light') {
        document.documentElement.classList.remove('dark');
      }
    })();
    // Toggle button
    document.addEventListener('DOMContentLoaded', function () {
      const toggleBtn = document.getElementById('theme-toggle');
      if (toggleBtn) {
        toggleBtn.addEventListener('click', function () {
          const isDark = document.documentElement.classList.contains('dark');
          setTheme(isDark ? 'light' : 'dark');
        });
      }
    });
  </script>
