<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vanille Cakes Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;family=Montserrat:wght@300;400;500;600&amp;family=Pinyon+Script&amp;family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#a1223d",
            secondary: "#ddb049",
            "background-light": "#fdfaf6",
            "background-dark": "#1a1212",
          },
          fontFamily: {
            display: ["Playfair Display", "serif"],
            brand: ["Pinyon Script", "cursive"],
            serif: ["Cormorant Garamond", "serif"],
            sans: ["Montserrat", "sans-serif"],
          },
        },
      },
    };
  </script>
</head>
<body class="bg-background-light dark:bg-background-dark text-gray-800 dark:text-gray-100 font-sans transition-colors duration-300 min-h-screen flex flex-col items-center py-24">

  <div class="flex items-center space-x-4 mb-12">
    <div class="flex items-center space-x-3">
      <img src="assets/flower-maroon.png" alt="Vanille Flower" class="h-16 w-auto object-contain dark:hidden">
      <img src="assets/flower-white.png" alt="Vanille Flower" class="h-16 w-auto object-contain hidden dark:block">
      <span class="text-6xl font-brand text-primary dark:text-secondary">Vanille</span>
    </div>
    <div class="h-12 w-px bg-gray-300 dark:bg-gray-700 mx-4"></div>
    <h1 class="text-5xl font-serif text-gray-500">Admin Dashboard</h1>
  </div>

  <!-- Login Section -->
  <div id="login-section" class="bg-white dark:bg-gray-900 rounded-xl shadow-xl p-8 max-w-sm w-full mx-4">
    <h2 class="text-2xl font-display mb-6">Enter Admin Key</h2>
    <form id="login-form" class="space-y-4">
      <input type="password" id="admin-key" class="w-full border border-secondary rounded px-4 py-2" placeholder="Secret Key" required />
      <button type="submit" class="w-full bg-primary text-white px-6 py-2 rounded font-semibold uppercase tracking-wider hover:bg-opacity-90 transition-all">Login</button>
      <div id="login-error" class="text-red-600 mt-2 hidden text-sm">Incorrect key or server unreachable.</div>
    </form>
    <div class="mt-6 text-center"><a href="index.html" class="text-secondary text-sm underline">&larr; Back to Home</a></div>
  </div>

  <!-- Dashboard Section -->
  <div id="dashboard-section" class="hidden w-full max-w-5xl px-4">
    <div class="flex justify-between items-center mb-10 border-b border-gray-200 dark:border-gray-800 pb-4">
      <div class="flex space-x-4">
        <button onclick="switchTab('gallery')" id="tab-gallery" class="px-4 py-2 text-xl font-display text-primary border-b-2 border-primary">Manage Gallery</button>
        <button onclick="switchTab('blog')" id="tab-blog" class="px-4 py-2 text-xl font-display text-gray-500 border-b-2 border-transparent hover:text-primary">Manage Blog</button>
      </div>
      <button onclick="logout()" class="text-sm text-secondary underline">Logout</button>
    </div>

    <!-- Gallery Upload Tool -->
    <div id="panel-gallery">
      <div class="bg-white dark:bg-gray-900 rounded-xl shadow-xl p-8 max-w-xl mx-auto mb-16">
        <h2 class="text-2xl font-display text-primary dark:text-secondary mb-4">Upload New Gallery Image</h2>
        <form id="gallery-form" class="space-y-4">
          <input type="text" id="g-name" class="w-full border border-secondary rounded px-4 py-2" placeholder="Product Name" required />
          <input type="file" id="g-file" accept="image/*" class="w-full border border-secondary rounded px-2 py-2" />
          <input type="url" id="g-url" class="w-full border border-secondary rounded px-4 py-2" placeholder="Or paste image URL" />
          <button type="submit" class="bg-primary text-white px-6 py-2 rounded font-semibold uppercase tracking-wider hover:bg-opacity-90 transition-all">Upload to Gallery</button>
        </form>
        <div id="g-msg" class="text-green-600 mt-4 hidden">Successfully uploaded!</div>
      </div>

      <!-- Gallery Management -->
      <div class="bg-white dark:bg-gray-900 rounded-xl shadow-xl p-8 max-w-4xl mx-auto">
        <h2 class="text-2xl font-display text-primary dark:text-secondary mb-6">Manage Gallery Items</h2>
        <div id="gallery-list-admin" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <!-- Gallery items will be loaded here -->
        </div>
      </div>
    </div>

    <!-- Blog Upload Tool -->
    <div id="panel-blog" class="hidden">
      <div class="bg-white dark:bg-gray-900 rounded-xl shadow-xl p-8 max-w-xl mx-auto mb-16">
        <h2 class="text-2xl font-display text-primary dark:text-secondary mb-4">Post New Blog</h2>
        <form id="blog-form" class="space-y-4">
          <input type="text" id="b-title" class="w-full border border-secondary rounded px-4 py-2" placeholder="Title" required />
          <input type="text" id="b-author" class="w-full border border-secondary rounded px-4 py-2" placeholder="Author" required />
          <input type="date" id="b-date" class="w-full border border-secondary rounded px-4 py-2" required />
          <input type="file" id="b-file" accept="image/*" class="w-full border border-secondary rounded px-2 py-2" />
          <input type="url" id="b-url" class="w-full border border-secondary rounded px-4 py-2" placeholder="Or paste image URL" />
          <textarea id="b-content" class="w-full border border-secondary rounded px-4 py-2" rows="5" placeholder="Blog content..." required></textarea>
          <button type="submit" class="bg-primary text-white px-6 py-2 rounded font-semibold uppercase tracking-wider hover:bg-opacity-90 transition-all">Publish Blog</button>
        </form>
        <div id="b-msg" class="text-green-600 mt-4 hidden">Successfully published!</div>
      </div>

      <!-- Blog Management -->
      <div class="bg-white dark:bg-gray-900 rounded-xl shadow-xl p-8 max-w-4xl mx-auto">
        <h2 class="text-2xl font-display text-primary dark:text-secondary mb-6">Manage Blog Posts</h2>
        <div id="blog-list-admin" class="space-y-4">
          <!-- Blog posts will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <script>
    let token = localStorage.getItem('adminToken');
    const API_URL = 'http://localhost:5000';

    // Check token on load
    if (token) {
      showDashboard();
    }

    // Login Logic
    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      const key = document.getElementById('admin-key').value;
      try {
        const res = await fetch(`${API_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key })
        });
        if (res.ok) {
          const data = await res.json();
          token = data.token;
          localStorage.setItem('adminToken', token);
          showDashboard();
        } else {
          document.getElementById('login-error').classList.remove('hidden');
        }
      } catch (err) {
        document.getElementById('login-error').classList.remove('hidden');
      }
    };

    function logout() {
      token = null;
      localStorage.removeItem('adminToken');
      document.getElementById('dashboard-section').classList.add('hidden');
      document.getElementById('login-section').classList.remove('hidden');
      document.getElementById('admin-key').value = '';
      document.getElementById('login-error').classList.add('hidden');
    }

    function showDashboard() {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('dashboard-section').classList.remove('hidden');
      loadAdminItems();
    }

    async function loadAdminItems() {
      // Load Gallery
      try {
        const gallery = await fetch(`${API_URL}/api/gallery`).then(r => r.json());
        const galleryList = document.getElementById('gallery-list-admin');
        galleryList.innerHTML = gallery.map((item, idx) => `
          <div class="flex items-center space-x-4 p-3 border border-gray-100 dark:border-gray-800 rounded-lg group">
            <img src="${item.imageUrl}" class="w-16 h-16 object-cover rounded shadow-sm">
            <div class="flex-1 min-w-0">
              <p class="font-medium truncate">${item.name}</p>
            </div>
            <button onclick="deleteGalleryItem(${idx})" class="text-red-500 hover:text-red-700 p-2 opacity-0 group-hover:opacity-100 transition-opacity">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>
        `).join('');
      } catch (err) { console.error("Gallery load error", err); }

      // Load Blogs
      try {
        const blogs = await fetch(`${API_URL}/api/blogs`).then(r => r.json());
        const blogList = document.getElementById('blog-list-admin');
        blogList.innerHTML = blogs.map((blog, idx) => `
          <div class="flex items-center justify-between p-4 border border-gray-100 dark:border-gray-800 rounded-lg group">
            <div class="flex-1 min-w-0">
              <h4 class="font-bold truncate">${blog.title}</h4>
              <p class="text-xs text-secondary">${blog.date} &bull; ${blog.author}</p>
            </div>
            <button onclick="deleteBlogItem(${idx})" class="text-red-500 hover:text-red-700 p-2 opacity-0 group-hover:opacity-100 transition-opacity">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>
        `).slice().reverse().join(''); // Reverse to match display order if needed, but indices must match the original array
        
        // Correcting indices for reversed display if necessary, or just keep it simple
        // Let's re-render without reverse for index safety or handle it properly.
        const reversedBlogs = [...blogs].reverse();
        blogList.innerHTML = reversedBlogs.map((blog, revIdx) => {
          const originalIdx = blogs.length - 1 - revIdx;
          return `
            <div class="flex items-center justify-between p-4 border border-gray-100 dark:border-gray-800 rounded-lg group">
              <div class="flex-1 min-w-0 mr-4">
                <h4 class="font-bold truncate">${blog.title}</h4>
                <p class="text-xs text-secondary">${blog.date} &bull; ${blog.author}</p>
              </div>
              <button onclick="deleteBlogItem(${originalIdx})" class="text-red-500 hover:text-red-700 p-2 opacity-0 group-hover:opacity-100 transition-opacity">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </div>
          `;
        }).join('');

      } catch (err) { console.error("Blog load error", err); }
    }

    async function deleteGalleryItem(index) {
      if (!confirm("Are you sure you want to delete this gallery item?")) return;
      try {
        const gallery = await fetch(`${API_URL}/api/gallery`).then(r => r.json());
        gallery.splice(index, 1);
        const res = await fetch(`${API_URL}/api/gallery`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(gallery)
        });
        if (res.ok) loadAdminItems();
        else alert("Failed to delete.");
      } catch (err) { alert("Error deleting."); }
    }

    async function deleteBlogItem(index) {
      if (!confirm("Are you sure you want to delete this blog post?")) return;
      try {
        const blogs = await fetch(`${API_URL}/api/blogs`).then(r => r.json());
        blogs.splice(index, 1);
        const res = await fetch(`${API_URL}/api/blogs`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(blogs)
        });
        if (res.ok) loadAdminItems();
        else alert("Failed to delete.");
      } catch (err) { alert("Error deleting."); }
    }

    function switchTab(tab) {
      document.getElementById('panel-gallery').classList.toggle('hidden', tab !== 'gallery');
      document.getElementById('panel-blog').classList.toggle('hidden', tab !== 'blog');
      
      document.getElementById('tab-gallery').className = tab === 'gallery' ? 'px-4 py-2 text-xl font-display text-primary border-b-2 border-primary' : 'px-4 py-2 text-xl font-display text-gray-500 border-b-2 border-transparent hover:text-primary';
      document.getElementById('tab-blog').className = tab === 'blog' ? 'px-4 py-2 text-xl font-display text-primary border-b-2 border-primary' : 'px-4 py-2 text-xl font-display text-gray-500 border-b-2 border-transparent hover:text-primary';
    }

    // Helper to upload image to get URL
    async function uploadMedia(fileInput, urlInput) {
      if (fileInput.files && fileInput.files[0]) {
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        const res = await fetch(`${API_URL}/upload`, { 
          method: 'POST', 
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData 
        });
        const data = await res.json();
        return data.url ? API_URL + data.url : '';
      }
      return urlInput.value.trim();
    }

    // Gallery Form Submit
    document.getElementById('gallery-form').onsubmit = async (e) => {
      e.preventDefault();
      try {
        const imageUrl = await uploadMedia(document.getElementById('g-file'), document.getElementById('g-url'));
        if (!imageUrl) return alert('Please provide an image.');
        
        const gallery = await fetch(`${API_URL}/api/gallery`).then(r => r.json());
        gallery.unshift({name: document.getElementById('g-name').value, imageUrl});

        const res = await fetch(`${API_URL}/api/gallery`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(gallery)
        });
        if (res.ok) {
          e.target.reset();
          document.getElementById('g-msg').classList.remove('hidden');
          setTimeout(() => document.getElementById('g-msg').classList.add('hidden'), 3000);
          loadAdminItems();
        } else {
          alert("Unauthorized or failed saving. Please log in again.");
          logout();
        }
      } catch(err) { alert('Error communicating with server.'); }
    };

    // Blog Form Submit
    document.getElementById('blog-form').onsubmit = async (e) => {
      e.preventDefault();
      try {
        const image = await uploadMedia(document.getElementById('b-file'), document.getElementById('b-url'));
        const newBlog = {
          title: document.getElementById('b-title').value,
          author: document.getElementById('b-author').value,
          date: document.getElementById('b-date').value,
          content: document.getElementById('b-content').value,
          image
        };
        
        const blogs = await fetch(`${API_URL}/api/blogs`).then(r => r.json());
        blogs.push(newBlog);

        const res = await fetch(`${API_URL}/api/blogs`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(blogs)
        });
        if (res.ok) {
          e.target.reset();
          document.getElementById('b-msg').classList.remove('hidden');
          setTimeout(() => document.getElementById('b-msg').classList.add('hidden'), 3000);
          loadAdminItems();
        } else {
          alert("Unauthorized or failed saving. Please log in again.");
          logout();
        }
      } catch(err) { alert('Error communicating with server.'); }
    };
  </script>
</body>
</html>
